<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inter de Litrão — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --preto:#15130F; --preto-2:#201C15; --ouro:#F2AE1E; --ouro-claro:#FFD65A;
    --osso:#F7F1E1; --osso-2:#EFE6CE; --vermelho:#D93B3B; --verde:#4C9A5B; --cinza:#8B8578;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--preto); color:var(--osso); font-family:'Work Sans', sans-serif; -webkit-font-smoothing:antialiased;}
  .display{font-family:'Anton', sans-serif; letter-spacing:.5px; text-transform:uppercase;}
  .wrap{max-width:640px; margin:0 auto; padding:20px 16px 60px;}
  header{background:var(--preto-2); border-bottom:1px solid rgba(242,174,30,.25); padding:16px; text-align:center;}
  header h1{margin:0; font-size:20px; color:var(--ouro-claro);}
  header p{margin:4px 0 0; font-size:12px; color:var(--cinza);}
  a{color:var(--ouro-claro);}

  .card{background:var(--osso); color:var(--preto); border-radius:14px; padding:18px; margin-bottom:16px; box-shadow:0 6px 16px rgba(0,0,0,.25);}
  label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:#5c5646; margin:10px 0 4px;}
  label:first-child{margin-top:0;}
  input[type=text], input[type=email], input[type=password], input[type=number], input[type=date]{
    width:100%; padding:10px 12px; border-radius:8px; border:1.5px solid #ddd2ae;
    font-family:'Work Sans'; font-size:14px; background:#fff; color:var(--preto);
  }
  input:focus{outline:2px solid var(--ouro); border-color:var(--ouro);}
  .checkbox-row{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px;}
  .checkbox-row input{width:auto;}

  .btn{display:inline-flex; align-items:center; gap:6px; border:none; cursor:pointer; font-weight:700; font-size:13.5px; padding:10px 16px; border-radius:999px;}
  .btn-ouro{background:var(--ouro); color:var(--preto);}
  .btn-vermelho{background:var(--vermelho); color:#fff;}
  .btn-outline{background:transparent; border:1.5px solid rgba(247,241,225,.4); color:var(--osso);}
  .btn-sm{padding:6px 12px; font-size:12px;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  .row-actions{display:flex; gap:8px; margin-top:10px;}
  .error-msg{color:var(--vermelho); font-size:13px; margin-top:10px;}
  .success-msg{color:var(--verde); font-size:13px; margin-top:10px;}

  .tabs{display:flex; gap:8px; margin-bottom:16px;}
  .tab-btn{flex:1; padding:10px; border-radius:10px; border:1.5px solid rgba(242,174,30,.3); background:none; color:var(--osso); font-weight:700; font-size:13px; cursor:pointer;}
  .tab-btn.active{background:var(--ouro); color:var(--preto); border-color:var(--ouro);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  .item{border-bottom:1px dashed #ddd2ae; padding-bottom:14px; margin-bottom:14px;}
  .item:last-child{border-bottom:none;}
  .item-header{font-weight:700; font-size:14px; display:flex; justify-content:space-between; align-items:center;}
  .item-header .badge{font-size:10px; background:var(--preto); color:var(--ouro-claro); padding:3px 8px; border-radius:999px;}
  .score-inline{display:flex; align-items:center; gap:8px;}
  .score-inline input{width:64px;}

  #loginScreen{max-width:360px; margin:60px auto; padding:0 16px;}
  .top-link{display:block; text-align:center; margin-top:14px; font-size:12.5px; color:var(--cinza);}
  .loading{text-align:center; color:var(--cinza); font-size:13px; padding:20px;}
</style>
</head>
<body>

<header>
  <h1 class="display">Inter de Litrão — Admin</h1>
  <p>Painel de gestão de jogos e elenco</p>
</header>

<div id="loginScreen">
  <div class="card">
    <label for="loginEmail">E-mail</label>
    <input type="email" id="loginEmail" placeholder="admin@time.com">
    <label for="loginPass">Senha</label>
    <input type="password" id="loginPass" placeholder="••••••••">
    <div class="row-actions">
      <button class="btn btn-ouro" style="width:100%;" onclick="doLogin()">Entrar</button>
    </div>
    <div id="loginError" class="error-msg"></div>
  </div>
  <a class="top-link" href="index.html">← Voltar para o site</a>
</div>

<div class="wrap" id="mainScreen" style="display:none;">
  <div class="row-actions" style="justify-content:space-between; margin-bottom:16px;">
    <a class="top-link" href="index.html" style="margin:0;">← Ver site</a>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">Sair</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabBtnMatches" onclick="switchTab('matches')">Jogos</button>
    <button class="tab-btn" id="tabBtnPlayers" onclick="switchTab('players')">Elenco</button>
  </div>

  <div class="tab-content active" id="tabMatches">
    <div class="card">
      <div style="font-weight:700; margin-bottom:8px;">Adicionar jogo</div>
      <label>Data</label>
      <input type="date" id="newDate">
      <label>Adversário</label>
      <input type="text" id="newOpp" placeholder="Ex: Capra FC (deixe em branco se for data aberta)">
      <div class="score-inline" style="margin-top:10px;">
        <div style="flex:1;"><label style="margin:0 0 4px;">Gols Inter</label><input type="number" id="newHome"></div>
        <div style="flex:1;"><label style="margin:0 0 4px;">Gols adversário</label><input type="number" id="newAway"></div>
      </div>
      <div class="checkbox-row"><input type="checkbox" id="newOpen"> <label style="margin:0;">Data disponível pra marcar</label></div>
      <div class="checkbox-row"><input type="checkbox" id="newFolga"> <label style="margin:0;">Sem jogo (folga)</label></div>
      <label>Observação (opcional)</label>
      <input type="text" id="newNote" placeholder="Ex: Quarta de Cinzas">
      <div class="row-actions">
        <button class="btn btn-ouro" onclick="addMatch()">Adicionar</button>
      </div>
      <div id="matchAddMsg"></div>
    </div>

    <div class="card">
      <div style="font-weight:700; margin-bottom:8px;">Todos os jogos</div>
      <div id="matchesList" class="loading">Carregando...</div>
    </div>
  </div>

  <div class="tab-content" id="tabPlayers">
    <div class="card">
      <div style="font-weight:700; margin-bottom:8px;">Adicionar jogador</div>
      <label>Nome</label>
      <input type="text" id="newName" placeholder="Nome do jogador">
      <div class="score-inline" style="margin-top:10px;">
        <div style="flex:1;"><label style="margin:0 0 4px;">Jogos</label><input type="number" id="newJogos" value="0"></div>
        <div style="flex:1;"><label style="margin:0 0 4px;">Gols</label><input type="number" id="newGols" value="0"></div>
        <div style="flex:1;"><label style="margin:0 0 4px;">Assist.</label><input type="number" id="newAssist" value="0"></div>
      </div>
      <div class="row-actions">
        <button class="btn btn-ouro" onclick="addPlayer()">Adicionar</button>
      </div>
      <div id="playerAddMsg"></div>
    </div>

    <div class="card">
      <div style="font-weight:700; margin-bottom:8px;">Elenco</div>
      <div id="playersList" class="loading">Carregando...</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://crrjrzetvkvnjvlrvtdp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bFGO4xUX3YYu4RZGJjgDAg_FHZaReYe';

let accessToken = null;
try{ accessToken = sessionStorage.getItem('ilb_admin_token'); }catch(e){}

function authHeaders(){
  return {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${accessToken || SUPABASE_KEY}`,
    'Content-Type': 'application/json'
  };
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Preencha e-mail e senha.'; return; }

  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(!res.ok || !data.access_token){
      errEl.textContent = 'E-mail ou senha incorretos.';
      return;
    }
    accessToken = data.access_token;
    try{ sessionStorage.setItem('ilb_admin_token', accessToken); }catch(e){}
    showMain();
  }catch(e){
    errEl.textContent = 'Erro de conexão. Tente novamente.';
  }
}

function doLogout(){
  accessToken = null;
  try{ sessionStorage.removeItem('ilb_admin_token'); }catch(e){}
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
}

function switchTab(tab){
  document.getElementById('tabMatches').classList.toggle('active', tab==='matches');
  document.getElementById('tabPlayers').classList.toggle('active', tab==='players');
  document.getElementById('tabBtnMatches').classList.toggle('active', tab==='matches');
  document.getElementById('tabBtnPlayers').classList.toggle('active', tab==='players');
}

async function showMain(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  await Promise.all([loadMatches(), loadPlayers()]);
}

/* ---------- JOGOS ---------- */
async function loadMatches(){
  const el = document.getElementById('matchesList');
  el.innerHTML = '<p class="loading">Carregando...</p>';
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?select=*&order=date.asc`, { headers: authHeaders() });
    if(res.status === 401){ doLogout(); return; }
    const rows = await res.json();
    if(rows.length === 0){ el.innerHTML = '<p class="loading">Nenhum jogo cadastrado.</p>'; return; }
    el.innerHTML = rows.map(m => matchItemHtml(m)).join('');
  }catch(e){
    el.innerHTML = '<p class="error-msg">Erro ao carregar jogos.</p>';
  }
}

function matchItemHtml(m){
  const dt = new Date(m.date + 'T12:00:00');
  const dateLabel = dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
  return `<div class="item" id="match-${m.id}">
    <div class="item-header">
      <span>${dateLabel}</span>
      <span class="badge">${m.is_folga ? 'Folga' : m.is_open ? 'Aberta' : (m.opponent || 'Sem nome')}</span>
    </div>
    <label>Adversário</label>
    <input type="text" id="opp-${m.id}" value="${(m.opponent||'').replace(/"/g,'&quot;')}">
    <div class="score-inline" style="margin-top:10px;">
      <div style="flex:1;"><label style="margin:0 0 4px;">Gols Inter</label><input type="number" id="home-${m.id}" value="${m.home_score ?? ''}"></div>
      <div style="flex:1;"><label style="margin:0 0 4px;">Gols advers.</label><input type="number" id="away-${m.id}" value="${m.away_score ?? ''}"></div>
    </div>
    <div class="checkbox-row"><input type="checkbox" id="open-${m.id}" ${m.is_open?'checked':''}> <label style="margin:0;">Disponível pra marcar</label></div>
    <div class="checkbox-row"><input type="checkbox" id="folga-${m.id}" ${m.is_folga?'checked':''}> <label style="margin:0;">Folga</label></div>
    <label>Observação</label>
    <input type="text" id="note-${m.id}" value="${(m.note||'').replace(/"/g,'&quot;')}">
    <div class="row-actions">
      <button class="btn btn-ouro btn-sm" onclick="saveMatch(${m.id})">Salvar</button>
      <button class="btn btn-vermelho btn-sm" onclick="deleteMatch(${m.id})">Excluir</button>
    </div>
    <div id="matchMsg-${m.id}"></div>
  </div>`;
}

async function addMatch(){
  const msgEl = document.getElementById('matchAddMsg');
  const date = document.getElementById('newDate').value;
  if(!date){ msgEl.innerHTML = '<p class="error-msg">Escolha uma data.</p>'; return; }
  const body = {
    date,
    opponent: document.getElementById('newOpp').value.trim() || null,
    home_score: document.getElementById('newHome').value === '' ? null : Number(document.getElementById('newHome').value),
    away_score: document.getElementById('newAway').value === '' ? null : Number(document.getElementById('newAway').value),
    is_open: document.getElementById('newOpen').checked,
    is_folga: document.getElementById('newFolga').checked,
    note: document.getElementById('newNote').value.trim() || null
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches`, {
      method: 'POST',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao adicionar. Confira se você está logado.</p>'; return; }
    msgEl.innerHTML = '<p class="success-msg">Jogo adicionado!</p>';
    ['newDate','newOpp','newHome','newAway','newNote'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('newOpen').checked = false;
    document.getElementById('newFolga').checked = false;
    loadMatches();
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function saveMatch(id){
  const msgEl = document.getElementById(`matchMsg-${id}`);
  const body = {
    opponent: document.getElementById(`opp-${id}`).value.trim() || null,
    home_score: document.getElementById(`home-${id}`).value === '' ? null : Number(document.getElementById(`home-${id}`).value),
    away_score: document.getElementById(`away-${id}`).value === '' ? null : Number(document.getElementById(`away-${id}`).value),
    is_open: document.getElementById(`open-${id}`).checked,
    is_folga: document.getElementById(`folga-${id}`).checked,
    note: document.getElementById(`note-${id}`).value.trim() || null
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao salvar.</p>'; return; }
    msgEl.innerHTML = '<p class="success-msg">Salvo!</p>';
    setTimeout(()=>{ if(msgEl) msgEl.innerHTML=''; }, 2000);
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function deleteMatch(id){
  if(!confirm('Excluir este jogo da agenda?')) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?id=eq.${id}`, {
      method: 'DELETE',
      headers: authHeaders()
    });
    if(res.ok) loadMatches();
    else alert('Erro ao excluir.');
  }catch(e){
    alert('Erro de conexão.');
  }
}

/* ---------- ELENCO ---------- */
async function loadPlayers(){
  const el = document.getElementById('playersList');
  el.innerHTML = '<p class="loading">Carregando...</p>';
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/players?select=*&order=gols.desc`, { headers: authHeaders() });
    if(res.status === 401){ doLogout(); return; }
    const rows = await res.json();
    if(rows.length === 0){ el.innerHTML = '<p class="loading">Nenhum jogador cadastrado.</p>'; return; }
    el.innerHTML = rows.map(p => playerItemHtml(p)).join('');
  }catch(e){
    el.innerHTML = '<p class="error-msg">Erro ao carregar elenco.</p>';
  }
}

function playerItemHtml(p){
  return `<div class="item" id="player-${p.id}">
    <label>Nome</label>
    <input type="text" id="pname-${p.id}" value="${(p.name||'').replace(/"/g,'&quot;')}">
    <div class="score-inline" style="margin-top:10px;">
      <div style="flex:1;"><label style="margin:0 0 4px;">Jogos</label><input type="number" id="pjogos-${p.id}" value="${p.jogos ?? 0}"></div>
      <div style="flex:1;"><label style="margin:0 0 4px;">Gols</label><input type="number" id="pgols-${p.id}" value="${p.gols ?? 0}"></div>
      <div style="flex:1;"><label style="margin:0 0 4px;">Assist.</label><input type="number" id="passist-${p.id}" value="${p.assistencias ?? 0}"></div>
    </div>
    <div class="row-actions">
      <button class="btn btn-ouro btn-sm" onclick="savePlayer(${p.id})">Salvar</button>
      <button class="btn btn-vermelho btn-sm" onclick="deletePlayer(${p.id})">Excluir</button>
    </div>
    <div id="playerMsg-${p.id}"></div>
  </div>`;
}

async function addPlayer(){
  const msgEl = document.getElementById('playerAddMsg');
  const name = document.getElementById('newName').value.trim();
  if(!name){ msgEl.innerHTML = '<p class="error-msg">Digite o nome do jogador.</p>'; return; }
  const body = {
    name,
    jogos: Number(document.getElementById('newJogos').value || 0),
    gols: Number(document.getElementById('newGols').value || 0),
    assistencias: Number(document.getElementById('newAssist').value || 0)
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/players`, {
      method: 'POST',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao adicionar.</p>'; return; }
    msgEl.innerHTML = '<p class="success-msg">Jogador adicionado!</p>';
    ['newName'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('newJogos').value = 0;
    document.getElementById('newGols').value = 0;
    document.getElementById('newAssist').value = 0;
    loadPlayers();
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function savePlayer(id){
  const msgEl = document.getElementById(`playerMsg-${id}`);
  const body = {
    name: document.getElementById(`pname-${id}`).value.trim(),
    jogos: Number(document.getElementById(`pjogos-${id}`).value || 0),
    gols: Number(document.getElementById(`pgols-${id}`).value || 0),
    assistencias: Number(document.getElementById(`passist-${id}`).value || 0)
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/players?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao salvar.</p>'; return; }
    msgEl.innerHTML = '<p class="success-msg">Salvo!</p>';
    setTimeout(()=>{ if(msgEl) msgEl.innerHTML=''; }, 2000);
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function deletePlayer(id){
  if(!confirm('Excluir este jogador do elenco?')) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/players?id=eq.${id}`, {
      method: 'DELETE',
      headers: authHeaders()
    });
    if(res.ok) loadPlayers();
    else alert('Erro ao excluir.');
  }catch(e){
    alert('Erro de conexão.');
  }
}

/* ---------- INIT ---------- */
if(accessToken){
  showMain();
}
</script>
</body>
</html>
