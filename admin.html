<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inter de Litrão — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --preto:#15130F; --preto-2:#201C15; --ouro:#F2AE1E; --ouro-claro:#FFD65A;
    --osso:#F7F1E1; --osso-2:#EFE6CE; --vermelho:#D93B3B; --verde:#4C9A5B; --cinza:#8B8578;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--preto); color:var(--osso); font-family:'Work Sans', sans-serif; -webkit-font-smoothing:antialiased;}
  .display{font-family:'Anton', sans-serif; letter-spacing:.5px; text-transform:uppercase;}
  .wrap{max-width:680px; margin:0 auto; padding:20px 16px 60px;}
  header{background:var(--preto-2); border-bottom:1px solid rgba(242,174,30,.25); padding:16px; text-align:center;}
  header h1{margin:0; font-size:20px; color:var(--ouro-claro);}
  header p{margin:4px 0 0; font-size:12px; color:var(--cinza);}
  a{color:var(--ouro-claro);}

  .card{background:var(--osso); color:var(--preto); border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:0 6px 16px rgba(0,0,0,.25);}
  label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:#5c5646; margin:10px 0 4px;}
  label:first-child{margin-top:0;}
  input[type=text], input[type=email], input[type=password], input[type=number], input[type=date]{
    width:100%; padding:9px 10px; border-radius:8px; border:1.5px solid #ddd2ae;
    font-family:'Work Sans'; font-size:14px; background:#fff; color:var(--preto);
  }
  input:focus{outline:2px solid var(--ouro); border-color:var(--ouro);}
  .checkbox-row{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px;}
  .checkbox-row input{width:auto;}

  .btn{display:inline-flex; align-items:center; gap:6px; border:none; cursor:pointer; font-weight:700; font-size:13.5px; padding:10px 16px; border-radius:999px;}
  .btn-ouro{background:var(--ouro); color:var(--preto);}
  .btn-vermelho{background:var(--vermelho); color:#fff;}
  .btn-outline{background:transparent; border:1.5px solid rgba(247,241,225,.4); color:var(--osso);}
  .btn-sm{padding:6px 12px; font-size:12px;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  .row-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .error-msg{color:var(--vermelho); font-size:13px; margin-top:8px;}
  .success-msg{color:var(--verde); font-size:13px; margin-top:8px;}
  .loading{text-align:center; color:var(--cinza); font-size:13px; padding:20px;}

  /* ---------- MATCH CARD (colapsável) ---------- */
  .match-card{background:var(--osso); color:var(--preto); border-radius:14px; margin-bottom:10px; overflow:hidden; box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .match-header{
    display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer;
    background:var(--osso-2);
  }
  .match-header .date-box{
    font-family:'Space Mono'; font-weight:700; font-size:13px; background:var(--preto); color:var(--ouro-claro);
    padding:5px 8px; border-radius:8px; flex-shrink:0;
  }
  .match-header .info{flex:1; min-width:0;}
  .match-header .opp{font-weight:700; font-size:14px;}
  .match-header .status{font-size:11px; color:#5c5646;}
  .match-header .chev{transition:transform .2s ease; flex-shrink:0; color:#5c5646;}
  .match-header .chev.open{transform:rotate(180deg);}
  .match-body{display:none; padding:14px; border-top:1px dashed #ddd2ae;}
  .match-body.open{display:block;}

  .score-inline{display:flex; align-items:center; gap:8px;}
  .score-inline > div{flex:1;}

  /* ---------- FICHA TÉCNICA (escalação) ---------- */
  .lineup-block{margin-top:16px; border-top:1px solid #ddd2ae; padding-top:12px;}
  .lineup-block-title{font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:#5c5646; margin-bottom:10px;}
  .lineup-row{
    display:grid; grid-template-columns:44px 1fr; gap:6px 8px; align-items:center;
    background:#fff; border:1px solid #eee2c0; border-radius:10px; padding:10px; margin-bottom:8px;
  }
  .lineup-row input[type=text], .lineup-row input[type=number]{padding:6px 8px; font-size:13px;}
  .lineup-row .grid-full{grid-column:1 / -1;}
  .lineup-row .stat-inputs{grid-column:1/-1; display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .lineup-row .stat-inputs label{margin:0 0 2px; font-size:9px;}
  .lineup-row .mvp-row{grid-column:1/-1; display:flex; align-items:center; gap:6px; font-size:12px;}
  .lineup-row .row-actions{grid-column:1/-1; margin-top:2px;}
  .lineup-add{background:var(--osso-2); border:1.5px dashed var(--ouro);}
</style>
</head>
<body>

<header>
  <h1 class="display">Inter de Litrão — Admin</h1>
  <p>Ficha técnica dos jogos</p>
</header>

<div id="loginScreen" class="wrap" style="max-width:360px; margin-top:40px;">
  <div class="card">
    <label for="loginEmail">E-mail</label>
    <input type="email" id="loginEmail" placeholder="admin@time.com">
    <label for="loginPass">Senha</label>
    <input type="password" id="loginPass" placeholder="••••••••">
    <div class="row-actions">
      <button class="btn btn-ouro" style="width:100%;" onclick="doLogin()">Entrar</button>
    </div>
    <div id="loginError" class="error-msg"></div>
  </div>
  <a style="display:block; text-align:center; font-size:12.5px; color:var(--cinza);" href="index.html">← Voltar para o site</a>
</div>

<div class="wrap" id="mainScreen" style="display:none;">
  <div class="row-actions" style="justify-content:space-between; margin-bottom:16px;">
    <a style="font-size:12.5px;" href="index.html">← Ver site</a>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">Sair</button>
  </div>

  <div class="card">
    <div style="font-weight:700; margin-bottom:8px;">Adicionar jogo</div>
    <label>Data</label>
    <input type="date" id="newDate">
    <label>Adversário</label>
    <input type="text" id="newOpp" placeholder="Ex: Capra FC (deixe em branco se for data aberta)">
    <div class="score-inline" style="margin-top:10px;">
      <div><label style="margin:0 0 4px;">Gols Inter</label><input type="number" id="newHome"></div>
      <div><label style="margin:0 0 4px;">Gols adversário</label><input type="number" id="newAway"></div>
    </div>
    <div class="checkbox-row"><input type="checkbox" id="newOpen"> <label style="margin:0;">Data disponível pra marcar</label></div>
    <div class="checkbox-row"><input type="checkbox" id="newFolga"> <label style="margin:0;">Sem jogo (folga)</label></div>
    <label>Observação (opcional)</label>
    <input type="text" id="newNote" placeholder="Ex: Quarta de Cinzas">
    <div class="row-actions">
      <button class="btn btn-ouro" onclick="addMatch()">Adicionar</button>
    </div>
    <div id="matchAddMsg"></div>
  </div>

  <div style="font-weight:700; margin:18px 0 10px;">Todos os jogos</div>
  <div id="matchesList" class="loading">Carregando...</div>
</div>

<script>
const SUPABASE_URL = 'https://crrjrzetvkvnjvlrvtdp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bFGO4xUX3YYu4RZGJjgDAg_FHZaReYe';

let accessToken = null;
try{ accessToken = sessionStorage.getItem('ilb_admin_token'); }catch(e){}

let MATCHES_CACHE = [];
const expandedMatches = {}; // match_id -> bool

function authHeaders(){
  return {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${accessToken || SUPABASE_KEY}`,
    'Content-Type': 'application/json'
  };
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Preencha e-mail e senha.'; return; }
  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(!res.ok || !data.access_token){ errEl.textContent = 'E-mail ou senha incorretos.'; return; }
    accessToken = data.access_token;
    try{ sessionStorage.setItem('ilb_admin_token', accessToken); }catch(e){}
    showMain();
  }catch(e){
    errEl.textContent = 'Erro de conexão. Tente novamente.';
  }
}

function doLogout(){
  accessToken = null;
  try{ sessionStorage.removeItem('ilb_admin_token'); }catch(e){}
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
}

async function showMain(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  await loadMatches();
}

/* ---------- JOGOS ---------- */
async function loadMatches(){
  const el = document.getElementById('matchesList');
  el.innerHTML = '<p class="loading">Carregando...</p>';
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?select=*&order=date.desc`, { headers: authHeaders() });
    if(res.status === 401){ doLogout(); return; }
    MATCHES_CACHE = await res.json();
    if(MATCHES_CACHE.length === 0){ el.innerHTML = '<p class="loading">Nenhum jogo cadastrado.</p>'; return; }
    el.innerHTML = MATCHES_CACHE.map(m => matchCardHtml(m)).join('');
  }catch(e){
    el.innerHTML = '<p class="error-msg">Erro ao carregar jogos.</p>';
  }
}

function matchCardHtml(m){
  const dt = new Date(m.date + 'T12:00:00');
  const dateLabel = dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
  const status = m.is_folga ? 'Folga' : m.is_open ? 'Data disponível' : (m.opponent || 'Sem adversário');
  const scoreLabel = (m.home_score !== null && m.away_score !== null) ? ` · ${m.home_score}x${m.away_score}` : '';
  const isOpen = !!expandedMatches[m.id];
  return `<div class="match-card">
    <div class="match-header" onclick="toggleMatch(${m.id})">
      <span class="date-box">${dateLabel}</span>
      <div class="info">
        <div class="opp">${status}${scoreLabel}</div>
        <div class="status">Toque para editar e ver a ficha técnica</div>
      </div>
      <span class="chev ${isOpen?'open':''}" id="chev-${m.id}">▾</span>
    </div>
    <div class="match-body ${isOpen?'open':''}" id="body-${m.id}">
      ${isOpen ? matchEditPanelHtml(m) : ''}
    </div>
  </div>`;
}

function matchEditPanelHtml(m){
  return `
    <label>Adversário</label>
    <input type="text" id="opp-${m.id}" value="${(m.opponent||'').replace(/"/g,'&quot;')}">
    <div class="score-inline" style="margin-top:10px;">
      <div><label style="margin:0 0 4px;">Gols Inter</label><input type="number" id="home-${m.id}" value="${m.home_score ?? ''}"></div>
      <div><label style="margin:0 0 4px;">Gols advers.</label><input type="number" id="away-${m.id}" value="${m.away_score ?? ''}"></div>
    </div>
    <div class="checkbox-row"><input type="checkbox" id="open-${m.id}" ${m.is_open?'checked':''}> <label style="margin:0;">Disponível pra marcar</label></div>
    <div class="checkbox-row"><input type="checkbox" id="folga-${m.id}" ${m.is_folga?'checked':''}> <label style="margin:0;">Folga</label></div>
    <label>Observação</label>
    <input type="text" id="note-${m.id}" value="${(m.note||'').replace(/"/g,'&quot;')}">
    <div class="row-actions">
      <button class="btn btn-ouro btn-sm" onclick="saveMatch(${m.id})">Salvar jogo</button>
      <button class="btn btn-vermelho btn-sm" onclick="deleteMatch(${m.id})">Excluir jogo</button>
    </div>
    <div id="matchMsg-${m.id}"></div>

    <div class="lineup-block">
      <div class="lineup-block-title">⚽ Ficha técnica (escalação)</div>
      <div id="lineupList-${m.id}" class="loading">Carregando escalação...</div>
    </div>
  `;
}

async function toggleMatch(id){
  const wasOpen = !!expandedMatches[id];
  expandedMatches[id] = !wasOpen;
  const chev = document.getElementById(`chev-${id}`);
  const body = document.getElementById(`body-${id}`);
  chev.classList.toggle('open', !wasOpen);
  body.classList.toggle('open', !wasOpen);

  if(!wasOpen){
    const m = MATCHES_CACHE.find(x => x.id === id);
    body.innerHTML = matchEditPanelHtml(m);
    await loadLineup(id);
  } else {
    body.innerHTML = '';
  }
}

async function addMatch(){
  const msgEl = document.getElementById('matchAddMsg');
  const date = document.getElementById('newDate').value;
  if(!date){ msgEl.innerHTML = '<p class="error-msg">Escolha uma data.</p>'; return; }
  const body = {
    date,
    opponent: document.getElementById('newOpp').value.trim() || null,
    home_score: document.getElementById('newHome').value === '' ? null : Number(document.getElementById('newHome').value),
    away_score: document.getElementById('newAway').value === '' ? null : Number(document.getElementById('newAway').value),
    is_open: document.getElementById('newOpen').checked,
    is_folga: document.getElementById('newFolga').checked,
    note: document.getElementById('newNote').value.trim() || null
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches`, {
      method: 'POST',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao adicionar. Confira se você está logado.</p>'; return; }
    msgEl.innerHTML = '<p class="success-msg">Jogo adicionado!</p>';
    ['newDate','newOpp','newHome','newAway','newNote'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('newOpen').checked = false;
    document.getElementById('newFolga').checked = false;
    loadMatches();
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function saveMatch(id){
  const msgEl = document.getElementById(`matchMsg-${id}`);
  const body = {
    opponent: document.getElementById(`opp-${id}`).value.trim() || null,
    home_score: document.getElementById(`home-${id}`).value === '' ? null : Number(document.getElementById(`home-${id}`).value),
    away_score: document.getElementById(`away-${id}`).value === '' ? null : Number(document.getElementById(`away-${id}`).value),
    is_open: document.getElementById(`open-${id}`).checked,
    is_folga: document.getElementById(`folga-${id}`).checked,
    note: document.getElementById(`note-${id}`).value.trim() || null
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao salvar.</p>'; return; }
    msgEl.innerHTML = '<p class="success-msg">Salvo!</p>';
    setTimeout(()=>{ if(msgEl) msgEl.innerHTML=''; }, 2000);
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function deleteMatch(id){
  if(!confirm('Excluir este jogo (e toda a ficha técnica dele) da agenda?')) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?id=eq.${id}`, {
      method: 'DELETE',
      headers: authHeaders()
    });
    if(res.ok) loadMatches();
    else alert('Erro ao excluir.');
  }catch(e){
    alert('Erro de conexão.');
  }
}

/* ---------- FICHA TÉCNICA (escalação por jogo) ---------- */
async function loadLineup(matchId){
  const el = document.getElementById(`lineupList-${matchId}`);
  if(!el) return;
  el.innerHTML = '<p class="loading">Carregando escalação...</p>';
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lineup_entries?match_id=eq.${matchId}&select=*&order=shirt_number.asc`, { headers: authHeaders() });
    const rows = await res.json();
    el.innerHTML = rows.map(p => lineupRowHtml(matchId, p)).join('') + lineupAddRowHtml(matchId);
  }catch(e){
    el.innerHTML = '<p class="error-msg">Erro ao carregar escalação.</p>';
  }
}

function lineupRowHtml(matchId, p){
  return `<div class="lineup-row" id="lineup-${p.id}">
    <input type="number" id="lnum-${p.id}" value="${p.shirt_number ?? ''}" placeholder="Nº">
    <input type="text" id="lpos-${p.id}" value="${(p.position||'').replace(/"/g,'&quot;')}" placeholder="Posição">
    <input type="text" class="grid-full" id="lname-${p.id}" value="${(p.player_name||'').replace(/"/g,'&quot;')}" placeholder="Nome do jogador">
    <div class="stat-inputs">
      <div><label>Gols</label><input type="number" id="lgols-${p.id}" value="${p.gols ?? 0}"></div>
      <div><label>Assist.</label><input type="number" id="lassist-${p.id}" value="${p.assistencias ?? 0}"></div>
      <div><label>Amarelo</label><input type="number" id="lam-${p.id}" value="${p.amarelo ?? 0}"></div>
      <div><label>Vermelho</label><input type="number" id="lve-${p.id}" value="${p.vermelho ?? 0}"></div>
    </div>
    <div class="mvp-row"><input type="checkbox" id="lmvp-${p.id}" ${p.mvp?'checked':''}> <label style="margin:0;">MVP da partida</label></div>
    <div class="row-actions">
      <button class="btn btn-ouro btn-sm" onclick="saveLineupRow(${matchId}, ${p.id})">Salvar</button>
      <button class="btn btn-vermelho btn-sm" onclick="deleteLineupRow(${matchId}, ${p.id})">Remover</button>
    </div>
    <div id="lineupMsg-${p.id}"></div>
  </div>`;
}

function lineupAddRowHtml(matchId){
  return `<div class="lineup-row lineup-add" id="lineup-new-${matchId}">
    <input type="number" id="newlnum-${matchId}" placeholder="Nº">
    <input type="text" id="newlpos-${matchId}" placeholder="Posição">
    <input type="text" class="grid-full" id="newlname-${matchId}" placeholder="Nome do jogador">
    <div class="stat-inputs">
      <div><label>Gols</label><input type="number" id="newlgols-${matchId}" value="0"></div>
      <div><label>Assist.</label><input type="number" id="newlassist-${matchId}" value="0"></div>
      <div><label>Amarelo</label><input type="number" id="newlam-${matchId}" value="0"></div>
      <div><label>Vermelho</label><input type="number" id="newlve-${matchId}" value="0"></div>
    </div>
    <div class="mvp-row"><input type="checkbox" id="newlmvp-${matchId}"> <label style="margin:0;">MVP da partida</label></div>
    <div class="row-actions">
      <button class="btn btn-ouro btn-sm" onclick="addLineupRow(${matchId})">+ Adicionar jogador a esta ficha</button>
    </div>
    <div id="lineupAddMsg-${matchId}"></div>
  </div>`;
}

async function addLineupRow(matchId){
  const msgEl = document.getElementById(`lineupAddMsg-${matchId}`);
  const name = document.getElementById(`newlname-${matchId}`).value.trim();
  if(!name){ msgEl.innerHTML = '<p class="error-msg">Digite o nome do jogador.</p>'; return; }
  const body = {
    match_id: matchId,
    shirt_number: document.getElementById(`newlnum-${matchId}`).value === '' ? null : Number(document.getElementById(`newlnum-${matchId}`).value),
    position: document.getElementById(`newlpos-${matchId}`).value.trim() || null,
    player_name: name,
    gols: Number(document.getElementById(`newlgols-${matchId}`).value || 0),
    assistencias: Number(document.getElementById(`newlassist-${matchId}`).value || 0),
    amarelo: Number(document.getElementById(`newlam-${matchId}`).value || 0),
    vermelho: Number(document.getElementById(`newlve-${matchId}`).value || 0),
    mvp: document.getElementById(`newlmvp-${matchId}`).checked
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lineup_entries`, {
      method: 'POST',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao adicionar.</p>'; return; }
    loadLineup(matchId);
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function saveLineupRow(matchId, rowId){
  const msgEl = document.getElementById(`lineupMsg-${rowId}`);
  const body = {
    shirt_number: document.getElementById(`lnum-${rowId}`).value === '' ? null : Number(document.getElementById(`lnum-${rowId}`).value),
    position: document.getElementById(`lpos-${rowId}`).value.trim() || null,
    player_name: document.getElementById(`lname-${rowId}`).value.trim(),
    gols: Number(document.getElementById(`lgols-${rowId}`).value || 0),
    assistencias: Number(document.getElementById(`lassist-${rowId}`).value || 0),
    amarelo: Number(document.getElementById(`lam-${rowId}`).value || 0),
    vermelho: Number(document.getElementById(`lve-${rowId}`).value || 0),
    mvp: document.getElementById(`lmvp-${rowId}`).checked
  };
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lineup_entries?id=eq.${rowId}`, {
      method: 'PATCH',
      headers: { ...authHeaders(), Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if(!res.ok){ msgEl.innerHTML = '<p class="error-msg">Erro ao salvar.</p>'; return; }
    msgEl.innerHTML = '<p class="success-msg">Salvo!</p>';
    setTimeout(()=>{ if(msgEl) msgEl.innerHTML=''; }, 2000);
  }catch(e){
    msgEl.innerHTML = '<p class="error-msg">Erro de conexão.</p>';
  }
}

async function deleteLineupRow(matchId, rowId){
  if(!confirm('Remover este jogador da ficha técnica deste jogo?')) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/lineup_entries?id=eq.${rowId}`, {
      method: 'DELETE',
      headers: authHeaders()
    });
    if(res.ok) loadLineup(matchId);
    else alert('Erro ao excluir.');
  }catch(e){
    alert('Erro de conexão.');
  }
}

/* ---------- INIT ---------- */
if(accessToken){
  showMain();
}
</script>
</body>
</html>
